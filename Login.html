<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlab - Login</title>
    <link rel="stylesheet" href="/CSS/login.css">
</head>
<body>

    <div class="container">
        <div class="login-side">
            
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="/logo_nuevo2.png" alt="Logo">
                    <h1>INLAB</h1>
                </div>
                <p class="subtitle">Gestión integral de laboratorios</p>
            </div>

            <form action="#" id="formLogin">
                <div class="form-group">
                    <label for="correo">Correo</label>
                    <input type="text" id="correo" name="correo" placeholder="Ingresa tu correo" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <h3 id="msg"></h3>
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
            </form>
        </div>

        <div class="info-side">
            <div class="icon-box">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="20" x2="22" y2="20"></line>
                </svg>
            </div>
            <h2>Control Total</h2>
            <p>Administra equipos, profesores y horarios desde un solo lugar.</p>
        </div>
    </div>

    <script src="/JS/login.js"></script>

</body>
</html>
