<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlab - Login</title>
    <link rel="stylesheet" href="/CSS/Login.css">
</head>
<body>

    <div class="container">
        <div class="login-side">
            
            <header>
                <h1>INLAB</h1>
                <p class="subtitle">Gestión integral de laboratorios</p>
            </header>

            <form action="Dashboard.html"> 
    <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
    </div>

    <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-submit">Login</button>
</form>
        </div>

        <div class="info-side">
            <div class="icon-box">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="20" x2="22" y2="20"></line>
                </svg>
            </div>
            <h2>Control Total</h2>
            <p>Administra equipos, profesores desde un solo lugar.</p>
        </div>
    </div>

</body>
</html>
